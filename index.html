*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131f;--surface-hover:#1a1a2e;--accent:#00ff42;--accent-hover:#00cc35;--accent-dim:rgba(0,255,66,0.1);--text:#f0f0f5;--text-sec:#c8c8d8;--text-dim:#8888a0;--border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);--font:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;--ease:cubic-bezier(0.16,1,0.3,1);--dur:0.2s}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}

@keyframes meshShift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-2%,1%) scale(1.03)}100%{transform:translate(1%,-1%) scale(0.98)}}

.app{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:80px 24px 48px;text-align:center}

.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--font);font-size:0.88rem;outline:none;transition:border-color var(--dur)}

.qr-output{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.qr-canvas-wrap{display:inline-block;background:#fff;border-radius:8px;padding:12px;margin-bottom:16px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:0.85rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:all var(--dur) var(--ease);border:none}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-sec);border:1px solid var(--border);padding:8px 14px;font-size:0.78rem}
.btn-ghost:hover{color:var(--text);border-color:var(--border-hover)}

.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

.history{margin-top:32px;text-align:left}
.history-title{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);margin-bottom:12px}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all var(--dur)}
.history-item:hover{border-color:var(--border-hover)}
.history-text{font-size:0.82rem;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px}
.history-type{font-size:0.6rem;padding:2px 6px;border-radius:3px;background:var(--accent-dim);color:var(--accent);font-family:var(--mono)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:10px 20px;border-radius:10px;font-size:0.82rem;font-weight:500;z-index:900;transition:transform 0.3s var(--ease);border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}

.footer{text-align:center;padding:32px 24px;border-top:1px solid var(--border);max-width:500px;margin:0 auto;position:relative;z-index:1}
.footer-links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.footer-links a{font-size:0.72rem;color:var(--text-sec)}
.footer-links a:hover{color:var(--accent)}
.footer-copy{font-size:0.58rem;color:var(--text-dim)}

@media(max-width:640px){

  .app{padding:24px 20px 80px}
  body{padding-bottom:64px}
  .footer{display:none}
}

<!-- EVEY NAV END --><div class="app">
  <h1>QR <em>Generator</em></h1>
  <p class="subtitle">Generate QR codes instantly. Private, offline, free.</p>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
let currentType = 'text';
let history = JSON.parse(localStorage.getItem('evey-qr-history') || '[]');

function setType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach((b, i) => {
    b.classList.toggle('active', ['text','wifi','email','phone'][i] === type);
  });
  ['text','wifi','email','phone'].forEach(t => {
    document.getElementById('form-' + t).style.display = t === type ? 'block' : 'none';
  });
  generate();
}

function getData() {
  switch (currentType) {
    case 'text': return document.getElementById('input-text').value.trim();
    case 'wifi': {
      const ssid = document.getElementById('wifi-ssid').value;
      const pass = document.getElementById('wifi-pass').value;
      const type = document.getElementById('wifi-type').value;
      if (!ssid) return '';
      return `WIFI:T:${type};S:${ssid};P:${pass};;`;
    }
    case 'email': {
      const addr = document.getElementById('email-addr').value;
      if (!addr) return '';
      const subj = document.getElementById('email-subj').value;
      const body = document.getElementById('email-body').value;
      return `mailto:${addr}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
    }
    case 'phone': {
      const num = document.getElementById('phone-num').value;
      return num ? `tel:${num}` : '';
    }
  }
}

function generate() {
  const data = getData();
  const output = document.getElementById('qr-output');
  if (!data) { output.style.display = 'none'; return; }

  const qr = qrcode(0, 'M');
  qr.addData(data);
  qr.make();

  const canvas = document.getElementById('qr-canvas');
  const size = 200;
  const count = qr.getModuleCount();
  const cell = Math.floor(size / count);
  canvas.width = cell * count;
  canvas.height = cell * count;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      ctx.fillStyle = qr.isDark(r, c) ? '#000' : '#fff';
      ctx.fillRect(c * cell, r * cell, cell, cell);
    }
  }

  document.getElementById('qr-data').textContent = data.length > 80 ? data.slice(0, 77) + '...' : data;
  output.style.display = 'block';
}

function downloadQR() {
  const canvas = document.getElementById('qr-canvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `qr-${Date.now()}.png`;
  a.click();
  addHistory(getData());
  toast('Downloaded');
}

function copyData() {
  navigator.clipboard.writeText(getData()).then(() => toast('Copied'));
}

function addHistory(data) {
  if (!data) return;
  history = history.filter(h => h.data !== data);
  history.unshift({ data, type: currentType, ts: Date.now() });
  history = history.slice(0, 10);
  localStorage.setItem('evey-qr-history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) { document.getElementById('history-section').style.display = 'none'; return; }
  document.getElementById('history-section').style.display = 'block';
  document.getElementById('history-list').innerHTML = history.map(h =>
    `<div class="history-item" onclick="loadHistory('${btoa(h.data)}','${h.type}')">
      <span class="history-text">${h.data.length > 40 ? h.data.slice(0,37)+'...' : h.data}</span>
      <span class="history-type">${h.type}</span>
    </div>`
  ).join('');
}

function loadHistory(b64, type) {
  const data = atob(b64);
  setType(type);
  if (type === 'text') document.getElementById('input-text').value = data;
  generate();
}

function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500); }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
renderHistory();
</script>
